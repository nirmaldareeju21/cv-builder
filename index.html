<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional CV Builder</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Editor -->
        <div class="editor no-print">
            <h2>Enter Your Details</h2>
            <input type="text" id="name" placeholder="Full Name" oninput="updateCV()">
            <input type="text" id="jobTitle" placeholder="Professional Title" oninput="updateCV()">
            <input type="file" accept="image/*" onchange="previewImage(event)">
            
            <input type="text" id="phone" placeholder="Phone Number" oninput="updateCV()">
            <input type="email" id="email" placeholder="Email Address" oninput="updateCV()">
            <input type="text" id="location" placeholder="City, Country" oninput="updateCV()">

            <textarea id="about" placeholder="Professional Summary" oninput="updateCV()"></textarea>
            <textarea id="education" placeholder="Education (Enter multiple lines)" oninput="updateCV()"></textarea>
            <textarea id="experience" placeholder="Experience (Enter multiple lines)" oninput="updateCV()"></textarea>
            <textarea id="skills" placeholder="Skills (Enter one per line)" oninput="updateCV()"></textarea>

            <button onclick="downloadPDF()">Download as PDF</button>
        </div>

        <!-- Preview -->
        <div class="preview" id="cv-template">
            <div class="header-section">
                <img id="display-photo" src="" alt="Photo" style="display:none;">
                <div class="title-details">
                    <h1 id="display-name">Nirmal Dareeju</h1>
                    <h2 id="display-jobTitle">Job Title</h2>
                </div>
            </div>

            <div class="content-section">
                <div class="left-col">
                    <div class="section">
                        <h4>Contact</h4>
                        <p id="display-phone">0773002061</p>
                        <p id="display-email">nirmaldareeju21@gmail.com</p>
                        <p id="display-location">Divulapitiya</p>
                    </div>

                    <div class="section">
                        <h4>Education</h4>
                        <div id="display-education" class="multi-line">Education details...</div>
                    </div>

                    <div class="section">
                        <h4>Skills</h4>
                        <ul id="display-skills">
                            <li>Your skills will appear here</li>
                        </ul>
                    </div>
                </div>

                <div class="right-col">
                    <div class="section">
                        <h4>Professional Summary</h4>
                        <div id="display-about" class="multi-line">Professional summary...</div>
                    </div>

                    <div class="section">
                        <h4>Professional Experience</h4>
                        <div id="display-experience" class="multi-line">Experience details...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
