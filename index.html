<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Builder By Nirmal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="editor">
            <h2>Enter Details</h2>
            <select id="templateSelector" onchange="changeTemplate()">
                <option value="modern">Modern (Blue)</option>
                <option value="classic">Classic (Dark)</option>
            </select>
            <input type="text" id="name" placeholder="Full Name" oninput="updateCV()">
            <input type="text" id="job" placeholder="Job Title" oninput="updateCV()">
            <input type="file" accept="image/*" onchange="previewImage(event)">
            <textarea id="about" placeholder="Summary" oninput="updateCV()"></textarea>
            <button onclick="downloadPDF()">Download as PDF</button>
        </div>
        <div class="preview modern" id="cv-template">
            <img id="display-photo" src="" alt="Photo" style="width:100px; display:none; border-radius:10px;">
            <h1 id="display-name">Nirmal Dareeju</h1>
            <h3 id="display-job">AC Technician</h3>
            <p id="display-about">Your professional summary will appear here...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
