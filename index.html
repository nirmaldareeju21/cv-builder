<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Template CV Builder</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="main-wrapper">
        <div class="editor no-print">
            <h2>Select Template</h2>
            <div class="template-selector">
                <button onclick="setTemplate('modern')">Modern (Side Photo)</button>
                <button onclick="setTemplate('classic')">Classic (Center)</button>
            </div>

            <div class="input-group">
                <label>Theme Color:</label>
                <input type="color" id="themeColor" value="#2c3e50" oninput="changeColor()">
            </div>

            <div class="section-title">Details</div>
            <input type="text" id="name" placeholder="Full Name" oninput="updateCV()">
            <input type="text" id="jobTitle" placeholder="Job Title" oninput="updateCV()">
            <input type="file" accept="image/*" onchange="previewImage(event)">
            <input type="text" id="phone" placeholder="Phone Number" oninput="updateCV()">
            <input type="email" id="email" placeholder="Email Address" oninput="updateCV()">
            <input type="text" id="location" placeholder="Location" oninput="updateCV()">
            
            <textarea id="about" placeholder="Summary" oninput="updateCV()"></textarea>
            <textarea id="experience" placeholder="Work Experience" oninput="updateCV()"></textarea>
            <textarea id="education" placeholder="Education" oninput="updateCV()"></textarea>
            <textarea id="skills" placeholder="Skills (Press Enter)" oninput="updateCV()"></textarea>

            <button onclick="downloadPDF()" class="btn-download">Download PDF</button>
        </div>

        <!-- The CV Page -->
        <div class="a4-page modern" id="cv-template">
            <div class="sidebar" id="sidebar-bg">
                <div class="photo-container">
                    <img id="display-photo" src="" alt="Photo" style="display:none;">
                </div>
                <div class="side-content">
                    <h4>Contact</h4>
                    <p>📞 <span id="display-phone">-</span></p>
                    <p>📧 <span id="display-email">-</span></p>
                    <p>📍 <span id="display-location">-</span></p>
                    
                    <h4>Skills</h4>
                    <ul id="display-skills"></ul>
                </div>
            </div>

            <div class="main-content">
                <div class="header">
                    <h1 id="display-name" class="theme-text">YOUR NAME</h1>
                    <h3 id="display-jobTitle">Professional Title</h3>
                </div>
                <div class="body-sections">
                    <h4 class="theme-text section-header">Summary</h4>
                    <p id="display-about" class="text-block">-</p>
                    <h4 class="theme-text section-header">Experience</h4>
                    <div id="display-experience" class="text-block">-</div>
                    <h4 class="theme-text section-header">Education</h4>
                    <div id="display-education" class="text-block">-</div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
