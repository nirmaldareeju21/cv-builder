<div class="main-wrapper">
    <!-- Editor -->
    <div class="editor no-print">
        <h2>CV Settings</h2>
        <div class="control-panel">
            <label>Template:</label>
            <div class="template-selector">
                <button onclick="setTemplate('modern')">Modern</button>
                <button onclick="setTemplate('classic')">Classic</button>
                <button onclick="setTemplate('minimalist')">Minimal</button>
            </div>
            <div class="color-controls">
                <div class="control-group">
                    <label>Sidebar Bg:</label>
                    <input type="color" id="bgColor" value="#2c3e50" oninput="applyColors()">
                </div>
                <div class="control-group">
                    <label>Text Color:</label>
                    <input type="color" id="textColor" value="#ffffff" oninput="applyColors()">
                </div>
            </div>
        </div>
        <!-- ඇතුළත් කරන තොරතුරු (Inputs) මීට කලින් එවපු ඒවාම භාවිතා කරන්න -->
        <input type="text" id="name" placeholder="Full Name" oninput="updateCV()">
        <input type="text" id="jobTitle" placeholder="Job Title" oninput="updateCV()">
        <input type="file" accept="image/*" onchange="previewImage(event)">
        <textarea id="about" placeholder="Summary" oninput="updateCV()"></textarea>
        <textarea id="experience" placeholder="Experience" oninput="updateCV()"></textarea>
        <textarea id="education" placeholder="Education" oninput="updateCV()"></textarea>
        <textarea id="skills" placeholder="Skills" oninput="updateCV()"></textarea>
        <button onclick="downloadPDF()" class="btn-download">Download PDF</button>
    </div>

    <!-- Responsive Preview Area -->
    <div class="preview-container">
        <div class="a4-page modern" id="cv-template">
            <!-- CV එක ඇතුළේ content එක කලින් එවපු HTML එකම තියන්න -->
            <div class="sidebar" id="cv-sidebar">
                <div class="photo-container"><img id="display-photo" src="" style="display:none;"></div>
                <div class="side-content">
                    <h4>Contact</h4>
                    <p id="display-phone">-</p>
                    <p id="display-email">-</p>
                    <ul id="display-skills"></ul>
                </div>
            </div>
            <div class="main-content">
                <h1 id="display-name" class="dynamic-heading">YOUR NAME</h1>
                <h3 id="display-jobTitle">Professional Title</h3>
                <h4 class="dynamic-heading section-title-bar">Summary</h4>
                <p id="display-about" class="text-block">-</p>
                <h4 class="dynamic-heading section-title-bar">Experience</h4>
                <div id="display-experience" class="text-block">-</div>
            </div>
        </div>
    </div>
</div>
