<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional CV Builder</title>
    <link rel="stylesheet" href="style.css">
    <!-- PDF එකක් ලෙස සේව් කිරීමට අවශ්‍ය ලයිබ්‍රරි එක -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="main-wrapper">
        <!-- වම් පස Editor කොටස -->
        <div class="editor no-print">
            <h2>CV Settings</h2>
            
            <div class="control-panel">
                <label>Select Template:</label>
                <div class="template-selector">
                    <button onclick="setTemplate('modern')">Modern</button>
                    <button onclick="setTemplate('classic')">Classic</button>
                    <button onclick="setTemplate('minimalist')">Minimalist</button>
                </div>

                <div class="color-controls">
                    <div class="control-group">
                        <label>Sidebar Bg:</label>
                        <input type="color" id="bgColor" value="#2c3e50" oninput="applyColors()">
                    </div>
                    <div class="control-group">
                        <label>Sidebar Text:</label>
                        <input type="color" id="textColor" value="#ffffff" oninput="applyColors()">
                    </div>
                </div>
            </div>

            <div class="section-title">Personal Info</div>
            <input type="text" id="name" placeholder="Full Name" oninput="updateCV()">
            <input type="text" id="jobTitle" placeholder="Job Title" oninput="updateCV()">
            <input type="file" accept="image/*" onchange="previewImage(event)">
            
            <input type="text" id="phone" placeholder="Phone" oninput="updateCV()">
            <input type="email" id="email" placeholder="Email" oninput="updateCV()">
            <input type="text" id="location" placeholder="Location" oninput="updateCV()">

            <div class="section-title">Experience & Skills</div>
            <textarea id="about" placeholder="Summary" oninput="updateCV()"></textarea>
            <textarea id="experience" placeholder="Work Experience" oninput="updateCV()"></textarea>
            <textarea id="education" placeholder="Education" oninput="updateCV()"></textarea>
            <textarea id="skills" placeholder="Skills (One per line)" oninput="updateCV()"></textarea>

            <button onclick="downloadPDF()" class="btn-download">Download as PDF</button>
        </div>

        <!-- දකුණු පස CV Preview (A4 Size) -->
        <div class="a4-page modern" id="cv-template">
            <div class="sidebar" id="cv-sidebar">
                <div class="photo-container">
                    <img id="display-photo" src="" alt="Photo" style="display:none;">
                </div>
                
                <div class="side-content">
                    <h4 class="side-header">Contact</h4>
                    <p>📞 <span id="display-phone">0773002061</span></p>
                    <p>📧 <span id="display-email">nirmal@mail.com</span></p>
                    <p>📍 <span id="display-location">Divulapitiya</span></p>

                    <h4 class="side-header">Skills</h4>
                    <ul id="display-skills">
                        <li>Skill 1</li>
                    </ul>
                </div>
            </div>

            <div class="main-content">
                <div class="header">
                    <h1 id="display-name" class="dynamic-heading">NIRMAL DAREEJU</h1>
                    <h3 id="display-jobTitle">Job Title</h3>
                </div>

                <div class="body-sections">
                    <h4 class="dynamic-heading section-title-bar">Professional Summary</h4>
                    <p id="display-about" class="text-block">Professional summary goes here...</p>

                    <h4 class="dynamic-heading section-title-bar">Experience</h4>
                    <div id="display-experience" class="text-block">Work experience details...</div>

                    <h4 class="dynamic-heading section-title-bar">Education</h4>
                    <div id="display-education" class="text-block">Education details...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
